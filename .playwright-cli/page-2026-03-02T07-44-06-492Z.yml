            - heading "What counts as a \"practice session\"?" [level=3] [ref=e69]
            - paragraph [ref=e70]: Any completed speaking session, writing submission, or reading/listening test counts as one session. Partial or abandoned attempts don't count.
          - generic [ref=e71]:
