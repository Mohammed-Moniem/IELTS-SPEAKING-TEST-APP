            - paragraph [ref=e73]: No, but your study plan may recommend focusing on specific modules. To maximise your chance of improvement, follow the plan recommendations.
          - generic [ref=e74]:
            - heading "What if I already have a high band score?" [level=3] [ref=e75]
            - paragraph [ref=e76]: The guarantee applies to any starting score. Even learners at band 7.5 can benefit — the 0.5 improvement threshold applies equally.
          - generic [ref=e77]:
            - heading "How do I claim the extension?" [level=3] [ref=e78]
            - paragraph [ref=e79]: Email support@spokio.app with your account email and the dates of your baseline and final tests. We'll verify your activity and extend your subscription within 48 hours.
          - generic [ref=e80]:
            - heading "Can I claim the guarantee more than once?" [level=3] [ref=e81]
            - paragraph [ref=e82]: The guarantee applies once per subscription period. If you're extended for 90 days, you can claim again after completing the extension period under the same terms.
